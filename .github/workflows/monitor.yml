name: Twitter Monitor

on:
  schedule:
    # 毎日20時（日本時間）= 11:00 UTC に実行
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -q --upgrade pip
          pip install -q -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run monitor
        env:
          TARGET_USERNAME: daikei_org
          KEYWORDS: ${{ secrets.KEYWORDS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          X_VERIFY: ${{ secrets.X_VERIFY }}
          SEEN_IDS_FILE: .seen_tweet_ids.json
          COOKIES_FILE: .x_cookies.json
          MONITOR_LOG_FILE: /home/w00dst0ck/apps/daikei_check/monitor_log.json
        run: python scripts/monitor.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .seen_tweet_ids.json .x_cookies.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push origin main
