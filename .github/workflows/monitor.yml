name: Twitter Monitor

on:
  schedule:
    # 15分ごとに実行 (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # .last_tweet_id をコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # 常に最新の状態のstateファイルを使う

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TARGET_USERNAME: ${{ secrets.TARGET_USERNAME }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          LAST_TWEET_ID_FILE: .last_tweet_id
        run: python scripts/monitor.py

      - name: Save last tweet ID
        run: |
          if [ -f .last_tweet_id ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .last_tweet_id
            git diff --cached --quiet || git commit -m "chore: update last tweet ID [skip ci]"
            git push origin main
          fi
