name: Twitter Monitor (API v2)

on:
  schedule:
    # 毎日20時（日本時間）= 11:00 UTC に実行
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TARGET_USERNAME: daikei_org
          KEYWORDS: ${{ secrets.KEYWORDS }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SEEN_IDS_FILE: .seen_tweet_ids.json
          MONITOR_LOG_FILE: /home/w00dst0ck/apps/daikei_check/monitor_log.json
        run: python scripts/monitor.py

      - name: Save state
        run: |
          if [ -f .seen_tweet_ids.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .seen_tweet_ids.json
            git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
            git push origin main
          fi
